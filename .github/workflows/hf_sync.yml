name: Sync to Hugging Face Spaces
on:
  push:
    branches: [master]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Prep and Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Isolate bot files and Dockerfile
          mkdir deploy_dir
          cp -r telegram_bot deploy_dir/telegram_bot
          cp Dockerfile deploy_dir/Dockerfile
          
          # Create Hugging Face metadata README.md
          echo "---" > deploy_dir/README.md
          echo "title: Smart Attendance Bot" >> deploy_dir/README.md
          echo "emoji: 🚀" >> deploy_dir/README.md
          echo "colorFrom: blue" >> deploy_dir/README.md
          echo "colorTo: indigo" >> deploy_dir/README.md
          echo "sdk: docker" >> deploy_dir/README.md
          echo "app_port: 7860" >> deploy_dir/README.md
          echo "pinned: false" >> deploy_dir/README.md
          echo "---" >> deploy_dir/README.md
          
          # Initialize clean repository and push
          cd deploy_dir
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy bot to Hugging Face Spaces"
          git push --force https://DanantST:$HF_TOKEN@huggingface.co/spaces/DanantST/smart-attendance-bot main
