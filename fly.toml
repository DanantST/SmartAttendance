# fly.toml file for Smart Attendance Bot

app = "smart-attendance-bot"
primary_region = "bos"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7860"
  START_WEB_SERVER = "true"
  DATABASE_PATH = "/app/data/bot_data.db"

[[mounts]]
  source = "bot_db_volume"
  destination = "/app/data"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
