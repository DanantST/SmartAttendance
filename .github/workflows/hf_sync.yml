name: Sync to Hugging Face Spaces
on:
  push:
    branches: [master]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Prep and Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Isolate bot files and Dockerfile
          mkdir deploy_dir
          cp -r telegram_bot deploy_dir/telegram_bot
          cp Dockerfile deploy_dir/Dockerfile
          
          # Initialize clean repository and push
          cd deploy_dir
          git init
          git checkout -b master
          git add .
          git commit -m "Deploy bot to Hugging Face Spaces"
          git push --force https://DanantST:$HF_TOKEN@huggingface.co/spaces/DanantST/smart-attendance-bot master
