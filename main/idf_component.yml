## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version — ESP32-P4 requires IDF v5.3+
  idf:
    version: '>=5.3.0'
  ## Pin component versions based on locally installed managed_components
  espressif/esp_cam_sensor: '~2.0.0'
  espressif/esp_lcd_touch_gt911: '~1.2.0'
  espressif/esp_hosted: '~2.12.0'
  espressif/esp_wifi_remote: '>=0.10.0'
  espressif/cjson: '*'
  100312dog/opencv-mobile-prebuilt-picolibc: '*'
  ## EK79007 MIPI-DSI bridge driver (CrowPanel Advanced 7")
  esp_lcd_ek79007: '^1.0.0'
